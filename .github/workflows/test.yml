name: TDR Run Tests
on:
  pull_request:
  push:
    branches-ignore:
      - main
      - release-*
permissions:
  id-token: write
  contents: write
jobs:
  test:
    uses: nationalarchives/tdr-github-actions/.github/workflows/tdr_test.yml@15d6da43f1b640ce977829a8c8577158e7d28743 # v0.0.25
    with:
      repo-name: tdr-aggregate-processing
      test-command: |
        sbt scalafmtCheckAll test
    secrets:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
